<!DOCTYPE html>
<html>
<head>
    <title>Inscription</title>
</head>
<body>
    <h2>Créer un compte</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">S'inscrire</button>
    </form>

    <p>Déjà un compte ? <a href="{% url 'accounts:login' %}">Se connecter</a></p>
</body>
</html>
