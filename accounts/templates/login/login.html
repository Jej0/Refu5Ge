<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
</head>
<body>
    <h2>Connexion</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>

    {% if form.errors %}
        <p style="color: red;">Nom d'utilisateur ou mot de passe incorrect. Veuillez réessayer.</p>
    {% endif %}

    {#lien vers register}
    <p>Pas encore de compte ? <a href="{% url 'accounts:register' %}">Inscrivez-vous</a></p>
    

</body>
</html>
