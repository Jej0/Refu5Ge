{% extends "base.html" %}
{% block content %}
    <h1>Éditer {{ model_name }} - {{ object }}</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        {{ form.as_p }}
        <button type="submit">Sauvegarder</button>
        {% if next %}
            <a href="{{ next }}" class="button">Annuler</a>
        {% else %}
            <a href="{% url 'test1' %}" class="button">Annuler</a>
        {% endif %}
    </form>
{% endblock %}
