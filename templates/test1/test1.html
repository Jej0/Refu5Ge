{% extends "base.html" %}
{% block content %}
    <h1>The most handsome test</h1>
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>Title</th>
                <th>Value</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in object_list %}
                <tr>
                    <td>{{ item.title }}</td>
                    <td>{{ item.value }}</td>
                    <td>
                        <a href="{% url 'edit_object' 'Test' item.id %}" class="button">Éditer</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3">Aucun élément</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <hr>
    <h2>Ajouter un nouvel élément</h2>
    <form method="POST" action="{% url 'test1_create' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ajouter</button>
    </form>
{% endblock %}
